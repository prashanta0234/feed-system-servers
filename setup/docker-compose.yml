name: feed-system

services:
  postgres-master:
    image: postgres:16
    container_name: postgres-master
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
      POSTGRES_DB: ${POSTGRES_DB:-feed_system}
      # Replication credentials used by the slave
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator_password}
    command: >
      postgres -c wal_level=replica -c max_wal_senders=10 -c max_replication_slots=10 -c hot_standby=on -c listen_addresses=*
    volumes:
      - postgres-master-data:/var/lib/postgresql/data
      - ./init/master:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-feed_system}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feed-net

  postgres-slave:
    image: postgres:16
    container_name: postgres-slave
    restart: unless-stopped
    depends_on:
      postgres-master:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator_password}
      MASTER_HOST: postgres-master
      MASTER_PORT: "5432"
    # entrypoint script bootstraps the standby from the master via pg_basebackup
    entrypoint: [ "/bin/bash", "/init/slave/setup-slave.sh" ]
    volumes:
      - postgres-slave-data:/var/lib/postgresql/data
      - ./init/slave:/init/slave
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feed-net

  redis:
    image: redis:7
    container_name: feed-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feed-net

volumes:
  postgres-master-data:
  postgres-slave-data:
  redis-data:

networks:
  feed-net:
    driver: bridge
